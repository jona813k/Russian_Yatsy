# nixpacks auto-detects Python from requirements.txt at root and sets up pip.
# We only need to add Node for the frontend build.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd web/frontend && npm install"
]

[phases.build]
cmds = ["cd web/frontend && npm run build"]

[start]
cmd = "uvicorn web.backend.main:app --host 0.0.0.0 --port $PORT"
