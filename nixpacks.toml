[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m pip install -r web/requirements.txt",
  "cd web/frontend && npm install"
]

[phases.build]
cmds = ["cd web/frontend && npm run build"]

[start]
cmd = "uvicorn web.backend.main:app --host 0.0.0.0 --port $PORT"
