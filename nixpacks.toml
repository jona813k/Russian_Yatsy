[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = ["python3", "python3-pip", "python3-venv"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r web/requirements.txt",
  "cd web/frontend && npm install"
]

[phases.build]
cmds = ["cd web/frontend && npm run build"]

[start]
cmd = "/opt/venv/bin/uvicorn web.backend.main:app --host 0.0.0.0 --port $PORT --app-dir /app"
